name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install CPU PyTorch
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # PyTorch ships GPU-CUDA wheels by default on Linux. Pin to CPU there;
          # Windows/macOS PyPI defaults are already CPU.
          if [ "${{ runner.os }}" = "Linux" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          else
            pip install torch
          fi

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=models --cov=utils --cov=experiments --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
